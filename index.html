<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link
            rel="icon"
            type="image/png"
            sizes="32x32"
            href="./assets/images/favicon-32x32.png"
        />
        <title>Frontend Mentor | Social links profile</title>
        <link rel="stylesheet" href="./css/main.css" />
    </head>
    <body>
        <main class="main">
            <section class="card">
                <img
                    class="card-avatar"
                    src="./assets/images/avatar-jessica.jpeg"
                    alt="User avatar"
                />
                <h1 class="card-name">Jessica Randall</h1>
                <h2 class="card-location">London, United Kingdom</h2>
                <h3 class="card-about">
                    "Front-end developer and avid reader."
                </h3>
                <ul class="card-social-links-list" role="list">
                    <li class="card-social-link"><a href="#">GitHub</a></li>
                    <li class="card-social-link">
                        <a href="#">Frontend Mentor</a>
                    </li>
                    <li class="card-social-link"><a href="#">LinkedIn</a></li>
                    <li class="card-social-link"><a href="#">Twitter</a></li>
                    <li class="card-social-link"><a href="#">Instagram</a></li>
                </ul>
            </section>
        </main>

        <footer class="footer-main attribution">
            <p>
                Challenge by
                <a
                    href="https://www.frontendmentor.io?ref=challenge"
                    target="_blank"
                    >Frontend Mentor</a
                >. Coded by <a href="#">Mark Tripney</a>.
            </p>
        </footer>
    </body>
</html>
